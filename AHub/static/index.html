<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>AssetHub - Університетський Проєкт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .auth-card { max-width: 450px; margin: 100px auto; border-radius: 12px; }
        .btn-primary { background-color: #004a99; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-page" class="card auth-card shadow-sm p-4">
        <h3 class="text-center mb-4">AssetHub Login</h3>
        <div class="mb-3">
            <label class="form-label">Email / ID Користувача</label>
            <input type="text" id="username" class="form-control" placeholder="student@univ.edu">
        </div>
        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="********">
                <button class="btn btn-outline-secondary" onclick="viewPass()">👁</button>
            </div>
            <small class="text-muted">8+ симв, А-z, 0-9, спецсимвол (!@#)</small>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" id="gdpr" class="form-check-input">
            <label class="form-check-label">Згода на обробку персональних даних (GDPR)</label>
        </div>
        <div class="d-grid gap-2">
            <button class="btn btn-primary" onclick="auth('/api/login')">Увійти</button>
            <button class="btn btn-outline-secondary" onclick="auth('/api/register')">Зареєструватися</button>
        </div>
    </div>

    <div id="main-page" class="hidden mt-5">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <h2 id="user-header">Кабінет студента</h2>
            <button class="btn btn-danger btn-sm" onclick="exit()">Вийти</button>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm p-4">
                    <h5>Мої цифрові активи</h5>
                    <ul id="asset-list" class="list-group list-group-flush mt-3">
                        </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:5000";

    function viewPass() {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    async function auth(path) {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const gdpr = document.getElementById('gdpr').checked;

        if (path.includes('register') && !gdpr) {
            alert("Для реєстрації потрібна згода GDPR!");
            return;
        }

        try {
            const res = await fetch(API_URL + path, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            
            if (res.ok) {
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    loadDashboard();
                } else {
                    alert(data.message);
                }
            } else {
                alert(data.message || "Помилка автентифікації");
            }
        } catch (e) { alert("Сервер недоступний"); }
    }

    async function loadDashboard() {
        const token = localStorage.getItem('token');
        if (!token) return;

        const res = await fetch(API_URL + '/api/my-assets', {
            headers: {'Authorization': `Bearer ${token}`}
        });

        if (res.status === 401) exit();

        const data = await res.json();
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('main-page').classList.remove('hidden');
        document.getElementById('user-header').innerText = `Користувач: ${data.user}`;
        
        const list = document.getElementById('asset-list');
        list.innerHTML = data.assets.map(a => `
            <li class="list-group-item d-flex justify-content-between">
                <span>📄 ${a.name}</span>
                <span class="badge bg-primary rounded-pill">${a.cat}</span>
            </li>
        `).join('') || '<p class="text-muted mt-3">У вас поки немає завантажених активів.</p>';
    }

    function exit() {
        localStorage.removeItem('token');
        location.reload();
    }

    // Авто-вхід при наявності токена
    if (localStorage.getItem('token')) loadDashboard();
</script>

</body>
</html>
